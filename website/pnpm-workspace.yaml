# pnpm 11 only reads overrides and build-script allow-lists from this
# file. The legacy `pnpm.overrides` and `pnpm.onlyBuiltDependencies`
# blocks in package.json are silently ignored after pnpm v11.

overrides:
  # GHSA-76p7-773f-r4q5: serialize-javascript <6.0.2 leaks XSS via
  # crafted Object.prototype payloads. Pulled transitively through
  # the Docusaurus webpack plugins; not a direct dep.
  serialize-javascript: ">=7.0.5"
  # CVE-2026-41305 (GHSA-qx2v-qp2m-jg93): postcss <8.5.10 has XSS via
  # unescaped </style> in stringify output. Transitive via
  # @docusaurus/core.
  postcss: ">=8.5.10"
  # uuid <14.0.0 floor for a single resolved major across the tree;
  # multiple Docusaurus transitives still pin older 9.x/10.x lines.
  uuid: ">=14.0.0"
  # GHSA-rwhq-pwvg-2vrg: @babel/plugin-transform-modules-systemjs
  # 7.12.0..=7.29.3 can generate arbitrary code when compiling
  # malicious input. Transitive via @docusaurus/core > @babel.
  "@babel/plugin-transform-modules-systemjs": ">=7.29.4"
  # fast-uri <3.1.4 carries three advisories on the 3.x line, all
  # fixed by 3.1.4: GHSA-86c8-pmm6-93fp (host confusion via
  # percent-encoded authority delimiters), CVE-2026-13676 (security
  # policy bypass via improper Unicode hostname canonicalisation),
  # and CVE-2026-16221; supersedes the earlier >=3.1.2 floor.
  # Transitive via @docusaurus/core > webpack > schema-utils > ajv.
  # Held to the 3.x line expected by ajv.
  fast-uri: ">=3.1.4 <4"
  # mermaid <11.15.0 resolves four moderate alerts on classDef,
  # classDefs, configuration, and Gantt-chart sanitisation.
  # Transitive via @docusaurus/theme-mermaid.
  mermaid: ">=11.15.0"
  # GHSA-mx8g-39q3-5c79: webpack-dev-server <5.2.5 lets a malicious
  # page intercept the HMR WebSocket through permissive user proxies;
  # supersedes the earlier CVE-2026-6402 <=5.2.3 floor. Transitive via
  # @docusaurus/core; only active during `pnpm start`.
  webpack-dev-server: ">=5.2.5 <6"
  # CVE-2026-48779 (GHSA-96hv-2xvq-fx4p): ws >=8.0.0 <8.21.0 allows a
  # memory-exhaustion DoS from a flood of tiny WebSocket fragments;
  # supersedes the earlier CVE-2026-45736 <8.20.1 floor. Transitive
  # via @docusaurus/core > webpack-dev-server and
  # webpack-bundle-analyzer.
  ws: ">=8.21.0"
  # CVE-2026-9277 (GHSA-w7jw-789q-3m8p): shell-quote <=1.8.3 fails to
  # escape newlines in quote(), enabling command injection when the
  # output is handed to a shell. Transitive via @docusaurus/core >
  # webpack-dev-server > launch-editor.
  shell-quote: ">=1.8.4"
  # undici <7.28.0 carries three high-severity advisories, all fixed
  # in 7.28.0: GHSA-vmh5-mc38-953g (TLS certificate validation
  # bypass), GHSA-vxpw-j846-p89q (WebSocket client DoS), and
  # GHSA-hm92-r4w5-c3mj (cross-origin request routing). Transitive via
  # @easyops-cn/docusaurus-search-local > cheerio. Held to the 7.x
  # line since the fix landed in 7.28.0 and nothing in the tree needs
  # undici 8.
  undici: ">=7.28.0 <8"
  # dompurify <3.4.11 carries a cluster of eight sanitizer-bypass and
  # config-pollution advisories (GHSA-x4vx-rjvf-j5p4,
  # GHSA-vxr8-fq34-vvx9, GHSA-gvmj-g25r-r7wr, GHSA-rp9w-3fw7-7cwq,
  # GHSA-hpcv-96wg-7vj8, GHSA-r47g-fvhr-h676, GHSA-76mc-f452-cxcm,
  # GHSA-cmwh-pvxp-8882), all fixed by 3.4.11. Transitive via
  # @docusaurus/theme-mermaid > mermaid.
  dompurify: ">=3.4.11 <4"
  # GHSA-4x5r-pxfx-6jf8: @babel/core <7.29.1 can read arbitrary files
  # through a crafted sourceMappingURL comment during compilation.
  # Transitive via @docusaurus/core > @docusaurus/babel.
  "@babel/core": ">=7.29.1 <8"
  # GHSA-64mm-vxmg-q3vj: http-proxy-middleware <2.0.10 matches its
  # router by host+path substring, letting a crafted Host header reach
  # an unintended backend. Transitive via @docusaurus/core >
  # webpack-dev-server; only active during `pnpm start`.
  http-proxy-middleware: ">=2.0.10 <3"
  # GHSA-q7cg-457f-vx79: joi <17.13.4 throws an uncaught RangeError on
  # deeply nested input through recursive link() schemas. Transitive
  # via @docusaurus/core > @docusaurus/utils > @docusaurus/types.
  joi: ">=17.13.4 <18"
  # GHSA-h67p-54hq-rp68: js-yaml quadratic-complexity DoS in merge-key
  # handling via repeated aliases, fixed in 3.15.0 and 4.1.2. Two
  # lines resolve in the tree: gray-matter pins js-yaml 3 (kept on the
  # 3.x fix so its safeLoad API survives) and Docusaurus build tooling
  # pulls js-yaml 4.
  "js-yaml@3": ">=3.15.0 <4"
  "js-yaml@4": ">=4.1.2 <5"
  # GHSA-v6wh-96g9-6wx3: launch-editor <2.14.1 leaks an NTLMv2 hash
  # through UNC path handling on Windows. Transitive via
  # @docusaurus/core > webpack-dev-server; only active during
  # `pnpm start`.
  launch-editor: ">=2.14.1 <3"
  # GHSA-q8mj-m7cp-5q26: qs 6.11.1..=6.15.1 crashes with a TypeError
  # (DoS) on null/undefined entries in comma-format arrays when
  # encodeValuesOnly is set. Transitive via @docusaurus/core >
  # webpack-dev-server > express > body-parser.
  qs: ">=6.15.2 <7"
  # websocket-driver <0.7.5 carries two advisories, both fixed in
  # 0.7.5: GHSA-xv26-6w52-cph6 (CVE-2026-54466, message corruption by
  # abusing protocol length headers) and GHSA-mp7j-qc5w-4988
  # (CVE-2026-54490, resource-limit bypass via message compression).
  # Transitive via @docusaurus/core > webpack-dev-server > sockjs >
  # faye-websocket; only active during `pnpm start`. Held to the 0.7
  # line because sockjs 0.3.24 declares ^0.7.4.
  websocket-driver: ">=0.7.5 <0.8"
  # CVE-2026-13149: brace-expansion 1.x <1.1.16 has an exponential-
  # time complexity DoS in pattern expansion. Transitive via the many
  # minimatch 3.x consumers in the webpack toolchain. Held to the 1.x
  # line because minimatch 3 declares ^1.1.7.
  "brace-expansion@1": ">=1.1.16 <2"
  # GHSA-f88m-g3jw-g9cj: sharp <0.35.0 bundles libvips builds subject
  # to CVE-2026-33327, CVE-2026-33328, CVE-2026-35590, and
  # CVE-2026-35591. Transitive via @docusaurus/plugin-ideal-image >
  # responsive-loader; only used at build time to resize doc images.
  sharp: ">=0.35.0 <0.36"
  # GHSA-2p49-hgcm-8545: svgo <3.3.4 leaves some executable scripts
  # intact despite the removeScripts plugin. Transitive via
  # @docusaurus/core > @svgr/webpack and cssnano > postcss-svgo. Held
  # to the 3.x line declared by both consumers.
  svgo: ">=3.3.4 <4"

# pnpm 11 replaces `onlyBuiltDependencies` with an explicit allow-map.
# Each entry permits the named package's install scripts to run;
# everything else is blocked by default.
allowBuilds:
  "@swc/core": true
  core-js: true
  sharp: true

minimumReleaseAgeExclude:
  - lucide-react@1.23.0
