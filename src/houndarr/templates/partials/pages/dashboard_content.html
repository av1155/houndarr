<div class="sr-only" data-page-key="dashboard" data-page-title="Dashboard | Houndarr" aria-hidden="true"></div>

<style>
  #instance-grid.is-entering {
    animation: instance-grid-enter var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes instance-grid-enter {
    from { opacity: 0.65; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .metric-changed {
    animation: metric-pulse 360ms var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes metric-pulse {
    0% {
      background-color: rgba(6, 182, 212, 0.20);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.28) inset;
    }
    100% {
      background-color: rgba(21, 27, 39, 0.70);
      box-shadow: 0 0 0 0 rgba(34, 211, 238, 0);
    }
  }

  [data-run-now-btn="true"] {
    transition:
      background-color var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      color            var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      box-shadow       var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      transform        var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  [data-run-now-btn="true"].is-running {
    background-color: rgb(14 116 144);
    color: rgb(207 250 254);
    box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35) inset;
  }

  [data-run-now-btn="true"].is-success {
    background-color: rgb(22 101 52);
    color: rgb(220 252 231);
    box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.38) inset;
  }

  [data-run-now-btn="true"].is-error {
    background-color: rgb(127 29 29);
    color: rgb(254 226 226);
    box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.40) inset;
    animation: run-now-shake 280ms var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes run-now-shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-3px); }
    40%      { transform: translateX(3px); }
    60%      { transform: translateX(-2px); }
    80%      { transform: translateX(2px); }
  }

  @media (prefers-reduced-motion: reduce) {
    #instance-grid.is-entering,
    .metric-changed {
      transition: none;
      animation: none;
      opacity: 1;
      transform: none;
    }
    [data-run-now-btn="true"].is-error {
      animation: none;
    }
  }

  /* ── Dashboard redesign: top section ─────────────────────────────── */
  .dash-main {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .dash-sub__eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-brand-400);
    margin: 0 0 8px;
    font-weight: 500;
  }
  .dash-sub__sentence {
    font-size: 30px;
    font-weight: 600;
    color: #e2e8f0;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .dash-sub__sentence .attn  { color: var(--color-danger); }
  .dash-sub__sentence .muted { color: #94a3b8; font-weight: 500; }

  .dash-alert {
    background: linear-gradient(135deg, rgba(248, 113, 113, 0.08), transparent 60%), var(--color-surface-1);
    border: 1px solid var(--color-danger-border);
    border-left: 3px solid var(--color-danger);
    border-radius: var(--radius-container);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-areas: "icon body link";
    align-items: start;
    gap: 14px 16px;
  }
  .dash-alert__icon { grid-area: icon; font-size: 18px; color: var(--color-danger); line-height: 1; margin-top: 1px; }
  .dash-alert__body { grid-area: body; min-width: 0; }
  .dash-alert__head {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #fca5a5;
    margin: 0 0 6px;
    font-weight: 600;
  }
  .dash-alert__text { font-size: 13px; color: #e2e8f0; margin: 0; line-height: 1.5; }
  .dash-alert__text .mono  { font-family: var(--font-mono); color: #fca5a5; }
  .dash-alert__text .muted { color: #94a3b8; }
  .dash-alert__link {
    grid-area: link;
    font-size: 12px;
    color: #fca5a5;
    text-decoration: none;
    font-weight: 500;
    padding: 6px 10px;
    border: 1px solid rgba(252, 165, 165, 0.35);
    border-radius: var(--radius-inset);
    white-space: nowrap;
    align-self: start;
    transition: background var(--dur-base) var(--ease-station);
  }
  .dash-alert__link:hover { background: rgba(248, 113, 113, 0.12); }

  .dash-lh {
    background: var(--color-surface-1);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-container);
    padding: 22px 26px;
    box-shadow: var(--shadow-1);
  }
  .dash-lh__eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #64748b;
    font-weight: 600;
    margin: 0 0 14px;
  }
  .dash-lh__headline {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .dash-lh__stat { display: flex; align-items: baseline; gap: 10px; }
  .dash-lh__stat-value {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .dash-lh__stat-value--eligible { color: var(--seg-eligible); }
  .dash-lh__stat-value--gated,
  .dash-lh__stat-value--unrel    { color: #cbd5e1; }
  .dash-lh__stat-label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #64748b;
    font-weight: 500;
  }
  .dash-lh__stat-label--eligible { color: var(--seg-eligible); opacity: 0.9; }
  .dash-lh__bar {
    display: flex;
    height: 14px;
    width: 100%;
    border-radius: var(--radius-bar);
    overflow: hidden;
    background: #0b0e14;
  }
  .dash-lh__segment { height: 100%; }
  .dash-lh__segment--eligible   { background: var(--seg-eligible);   opacity: 0.88; }
  .dash-lh__segment--cutoff-cd  { background: var(--seg-cutoff-cd);  opacity: 0.88; }
  .dash-lh__segment--cooldown   { background: var(--seg-cooldown);   opacity: 0.85; }
  .dash-lh__segment--upgrade-cd { background: var(--seg-upgrade-cd); opacity: 0.85; }
  .dash-lh__segment--unreleased { background: var(--seg-unreleased); opacity: 0.85; }
  .dash-lh__legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #94a3b8;
  }
  .dash-lh__legend-item { display: inline-flex; align-items: center; gap: 8px; }
  .dash-lh__legend-swatch { width: 10px; height: 10px; border-radius: var(--radius-bar); flex-shrink: 0; }
  .dash-lh__legend-swatch--eligible   { background: var(--seg-eligible); }
  .dash-lh__legend-swatch--cutoff-cd  { background: var(--seg-cutoff-cd); }
  .dash-lh__legend-swatch--cooldown   { background: var(--seg-cooldown); }
  .dash-lh__legend-swatch--upgrade-cd { background: var(--seg-upgrade-cd); }
  .dash-lh__legend-swatch--unreleased { background: var(--seg-unreleased); }

  .dash-trail {
    background: var(--color-surface-1);
    border: 1px solid var(--color-border-subtle);
    border-radius: var(--radius-container);
    padding: 20px 26px;
  }
  .dash-trail__head {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--seg-eligible);
    margin: 0 0 14px;
    font-weight: 600;
  }
  .dash-trail__list { display: flex; flex-direction: column; gap: 0; }
  .dash-trail__row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid var(--color-border-subtle);
  }
  .dash-trail__row:last-child { padding-bottom: 2px; }
  .dash-trail__title {
    font-size: 13.5px;
    color: #e2e8f0;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dash-trail__inst {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .dash-trail__when {
    font-family: var(--font-mono);
    font-size: 11px;
    color: #64748b;
    min-width: 56px;
    text-align: right;
  }
  .dash-trail__empty {
    font-size: 13px;
    color: #64748b;
    font-style: italic;
    padding: 10px 0 2px;
    margin: 0;
  }

  .dash-section-head {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 0 0;
    flex-wrap: wrap;
  }
  .dash-section-head__title {
    font-size: 28px;
    font-weight: 600;
    color: #e2e8f0;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 1.2;
    flex: 0 0 auto;
  }
  .dash-section-head__rule {
    flex: 1 1 40px;
    min-width: 40px;
    height: 1px;
    background: linear-gradient(
      to right,
      var(--color-border-default) 0%,
      var(--color-border-subtle) 85%,
      transparent 100%
    );
  }
  .dash-section-head__add {
    font-size: 13px;
    color: var(--color-brand-400);
    text-decoration: none;
    font-weight: 500;
    transition: color var(--dur-base) var(--ease-station);
    flex: 0 0 auto;
  }
  .dash-section-head__add:hover { color: var(--color-brand-300); }

  @media (max-width: 640px) {
    .dash-section-head__rule { display: none; }
    .dash-sub__sentence { font-size: 22px; }
    .dash-section-head__title { font-size: 22px; }
    .dash-lh { padding: 18px 18px; }
    .dash-lh__headline { gap: 22px; }
    .dash-lh__stat-value { font-size: 30px; }
    .dash-trail { padding: 16px 18px; }
    .dash-trail__row {
      grid-template-columns: minmax(0, 1fr) auto;
      row-gap: 4px;
      column-gap: 12px;
    }
    .dash-trail__inst { grid-column: 1 / 2; grid-row: 2; }
    .dash-trail__when { grid-column: 2 / 3; grid-row: 1 / 3; align-self: center; }
    .dash-alert {
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "icon body"
        "link link";
      padding: 14px 16px;
      gap: 12px 14px;
    }
    .dash-alert__link {
      justify-self: stretch;
      text-align: center;
      padding: 10px 14px;
      font-size: 13px;
    }
    .dash-alert__meta { display: block; margin-top: 4px; }
    .dash-alert__meta-lead { display: none; }
  }

  @media (max-width: 420px) {
    .dash-lh__headline { gap: 18px; }
    .dash-lh__stat-value { font-size: 26px; }
    .dash-lh__legend { gap: 10px; font-size: 10px; }
  }
</style>

<main class="dash-main">
  <!-- Top section populated on each poll: subheader, alert, library-health,
       recent hunts, section heading. -->
  <section id="dash-top" aria-live="polite"></section>

  <!-- Instance grid: polled every 30 s via HTMX against /api/status?v=2.
       The beforeSwap listener below parses the envelope, writes the top
       section into #dash-top as a side effect, and replaces this element
       with the card grid markup. -->
  <div
    id="instance-grid"
    data-hydrated="false"
    hx-get="/api/status?v=2"
    hx-trigger="load, every 30s"
    hx-swap="innerHTML"
    hx-target="#instance-grid"
  ></div>
</main>

<script>
  (function () {
    window.__houndarrDashboardPageController?.abort();
    const controller = new AbortController();
    window.__houndarrDashboardPageController = controller;
    const { signal } = controller;

    const RUN_NOW_MIN_RUNNING_MS  = 700;
    const RUN_NOW_SUCCESS_HOLD_MS = 900;
    const RUN_NOW_ERROR_HOLD_MS   = 1100;
    const previousMetrics = new Map();
    let gridInitialHydration = false;

    function toNumber(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function setRunNowButtonState(button, state) {
      const label = button.querySelector('[data-run-now-label]');
      const icon  = button.querySelector('[data-run-now-icon]');

      button.classList.remove('is-running', 'is-success', 'is-error');
      if (icon) icon.classList.remove('animate-spin');

      if (state === 'running') {
        button.classList.add('is-running');
        button.disabled = true;
        button.setAttribute('aria-busy', 'true');
        if (label) label.textContent = 'Running…';
        if (icon)  icon.classList.add('animate-spin');
        return;
      }

      button.disabled = false;
      button.setAttribute('aria-busy', 'false');

      if (state === 'success') {
        button.classList.add('is-success');
        if (label) label.textContent = 'Queued';
        return;
      }
      if (state === 'error') {
        button.classList.add('is-error');
        if (label) label.textContent = 'Failed';
        return;
      }
      if (label) label.textContent = 'Run now';
    }

    function completeRunNowRequest(button, statusCode) {
      const startedAt  = Number(button.dataset.runNowStartedAt || 0);
      const elapsed    = Math.max(0, Date.now() - startedAt);
      const waitForMin = Math.max(0, RUN_NOW_MIN_RUNNING_MS - elapsed);
      const outcome    = statusCode >= 200 && statusCode < 300 ? 'success' : 'error';
      const holdMs     = outcome === 'success' ? RUN_NOW_SUCCESS_HOLD_MS : RUN_NOW_ERROR_HOLD_MS;

      window.setTimeout(function () {
        if (!document.body.contains(button)) return;
        setRunNowButtonState(button, outcome);
        window.setTimeout(function () {
          if (!document.body.contains(button)) return;
          setRunNowButtonState(button, 'idle');
        }, holdMs);
      }, waitForMin);
    }

    // Type → color map (Station palette, unified saturation)
    const TYPE_COLOR_MAP = {
      sonarr:   '#7dd3fc',
      radarr:   '#fcd34d',
      lidarr:   '#6ee7b7',
      readarr:  '#fca5a5',
      whisparr_v2: '#f9a8d4',
      whisparr_v3: '#e879f9',
    };

    // ── Renderers: top-of-page sections (PR 2 redesign) ────────────────
    //
    // These take the /api/status?v=2 envelope and emit HTML strings for
    // the four top-of-page widgets plus the section heading.  All
    // dynamic values pass through escHtml so the result is safe to parse
    // via a <template> and adopt into the live DOM.

    function formatTimeAgo(iso) {
      if (!iso) return '';
      const ts = Date.parse(iso);
      if (Number.isNaN(ts)) return '';
      const delta = Math.max(0, Date.now() - ts);
      const s = Math.floor(delta / 1000);
      if (s < 60)     return `${s}s ago`;
      const m = Math.floor(s / 60);
      if (m < 60)     return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24)     return `${h}h ago`;
      const d = Math.floor(h / 24);
      return `${d}d ago`;
    }

    function formatPatrolEyebrow() {
      const now = new Date();
      const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const mo = monthNames[now.getMonth()];
      const day = String(now.getDate()).padStart(2, '0');
      const year = now.getFullYear();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const tz = now
        .toLocaleTimeString(undefined, { timeZoneName: 'short' })
        .split(' ')
        .pop();
      return `◉ Patrol · ${mo} ${day} ${year} · ${hh}:${mm} ${tz || ''}`.trim();
    }

    function renderSubheader(instances) {
      const eyebrow = formatPatrolEyebrow();
      if (instances.length === 0) {
        return `
<section class="dash-sub">
  <p class="dash-sub__eyebrow">${escHtml(eyebrow)}</p>
  <h1 class="dash-sub__sentence">No hounds on patrol yet.</h1>
</section>`;
      }
      const total = instances.length;
      const active = instances.filter(function (i) { return i.enabled; }).length;
      const errored = instances.find(function (i) { return i.active_error; });
      let sentence;
      if (errored) {
        const on = total - instances.filter(function (i) { return i.active_error; }).length;
        sentence = `${on} of ${total} hounds on patrol. <span class="attn">${escHtml(errored.name)} needs attention.</span>`;
      } else {
        const recent = instances
          .map(function (i) { return i.last_dispatch_at; })
          .filter(Boolean)
          .sort()
          .pop();
        const whenPart = recent
          ? `Last dispatch ${escHtml(formatTimeAgo(recent))}.`
          : 'No recent dispatches.';
        sentence = `All ${active} hounds on patrol. <span class="muted">${whenPart}</span>`;
      }
      return `
<section class="dash-sub">
  <p class="dash-sub__eyebrow">${escHtml(eyebrow)}</p>
  <h1 class="dash-sub__sentence">${sentence}</h1>
</section>`;
    }

    function renderAlert(instances) {
      const failing = instances.filter(function (i) { return i.active_error; });
      if (failing.length === 0) return '';
      const inst = failing[0];
      const failures = toNumber(inst.active_error && inst.active_error.failures_count);
      const failText = failures > 0 ? `${failures} failure${failures === 1 ? '' : 's'}` : 'Connection error';
      const whenAgo = inst.active_error ? formatTimeAgo(inst.active_error.timestamp) : '';
      const msg = (inst.active_error && inst.active_error.message) || '';
      const logsHref = `/logs?instance_id=${encodeURIComponent(inst.id)}&action=error`;
      return `
<section class="dash-alert" role="alert">
  <span class="dash-alert__icon" aria-hidden="true">⚠</span>
  <div class="dash-alert__body">
    <p class="dash-alert__head">Degraded · ${failing.length} hound${failing.length === 1 ? '' : 's'} offline</p>
    <p class="dash-alert__text">
      <strong>${escHtml(inst.name)}</strong><span class="muted">:</span>
      ${escHtml(msg || 'Could not reach instance')}<span class="dash-alert__meta"><span class="muted dash-alert__meta-lead">&nbsp;·&nbsp;</span>${escHtml(failText)} <span class="muted">·</span> last ${escHtml(whenAgo || 'just now')}</span>
    </p>
  </div>
  <a class="dash-alert__link" href="${logsHref}"
     hx-get="${logsHref}" hx-target="#app-content" hx-swap="innerHTML" hx-push-url="true">View logs →</a>
</section>`;
    }

    function renderLibraryHealth(instances) {
      const totals = instances.reduce(function (acc, i) {
        const bd = i.cooldown_breakdown || { missing: 0, cutoff: 0, upgrade: 0 };
        acc.monitored += toNumber(i.monitored_total);
        acc.cooldown  += toNumber(bd.missing);
        acc.cutoffCd  += toNumber(bd.cutoff);
        acc.upgradeCd += toNumber(bd.upgrade);
        acc.unreleased += toNumber(i.unreleased_count);
        return acc;
      }, { monitored: 0, cooldown: 0, cutoffCd: 0, upgradeCd: 0, unreleased: 0 });
      const gated = totals.cooldown + totals.cutoffCd + totals.upgradeCd;
      const eligible = Math.max(0, totals.monitored - gated - totals.unreleased);
      const ariaLabel = `${eligible} eligible, ${totals.cutoffCd} cutoff cooldown, ${totals.cooldown} cooldown, ${totals.upgradeCd} upgrade cooldown, ${totals.unreleased} unreleased`;
      return `
<section class="dash-lh" aria-label="Library health">
  <p class="dash-lh__eyebrow">Library health · ${totals.monitored} monitored</p>
  <div class="dash-lh__headline">
    <span class="dash-lh__stat">
      <span class="dash-lh__stat-value dash-lh__stat-value--eligible">${eligible}</span>
      <span class="dash-lh__stat-label dash-lh__stat-label--eligible">Eligible</span>
    </span>
    <span class="dash-lh__stat">
      <span class="dash-lh__stat-value dash-lh__stat-value--gated">${gated}</span>
      <span class="dash-lh__stat-label">Gated</span>
    </span>
    <span class="dash-lh__stat">
      <span class="dash-lh__stat-value dash-lh__stat-value--unrel">${totals.unreleased}</span>
      <span class="dash-lh__stat-label">Unreleased</span>
    </span>
  </div>
  <div class="dash-lh__bar" role="img" aria-label="${escHtml(ariaLabel)}">
    <div class="dash-lh__segment dash-lh__segment--eligible"   style="flex: ${eligible};"></div>
    <div class="dash-lh__segment dash-lh__segment--cutoff-cd"  style="flex: ${totals.cutoffCd};"></div>
    <div class="dash-lh__segment dash-lh__segment--cooldown"   style="flex: ${totals.cooldown};"></div>
    <div class="dash-lh__segment dash-lh__segment--upgrade-cd" style="flex: ${totals.upgradeCd};"></div>
    <div class="dash-lh__segment dash-lh__segment--unreleased" style="flex: ${totals.unreleased};"></div>
  </div>
  <div class="dash-lh__legend">
    <span class="dash-lh__legend-item"><span class="dash-lh__legend-swatch dash-lh__legend-swatch--eligible"></span>${eligible} eligible</span>
    <span class="dash-lh__legend-item"><span class="dash-lh__legend-swatch dash-lh__legend-swatch--cutoff-cd"></span>${totals.cutoffCd} cutoff cooldown</span>
    <span class="dash-lh__legend-item"><span class="dash-lh__legend-swatch dash-lh__legend-swatch--cooldown"></span>${totals.cooldown} cooldown</span>
    <span class="dash-lh__legend-item"><span class="dash-lh__legend-swatch dash-lh__legend-swatch--upgrade-cd"></span>${totals.upgradeCd} upgrade cooldown</span>
    <span class="dash-lh__legend-item"><span class="dash-lh__legend-swatch dash-lh__legend-swatch--unreleased"></span>${totals.unreleased} unreleased</span>
  </div>
</section>`;
    }

    function typeColorVar(typeName) {
      if (typeName === 'sonarr')      return 'var(--color-sonarr)';
      if (typeName === 'radarr')      return 'var(--color-radarr)';
      if (typeName === 'lidarr')      return 'var(--color-lidarr)';
      if (typeName === 'readarr')     return 'var(--color-readarr)';
      if (typeName === 'whisparr_v2') return 'var(--color-whisparr)';
      if (typeName === 'whisparr_v3') return 'var(--color-whisparr-v3)';
      return 'var(--color-brand-400)';
    }

    function renderRecentHunts(recentSearches) {
      if (!recentSearches || recentSearches.length === 0) {
        return `
<section class="dash-trail" aria-label="Recent searches">
  <p class="dash-trail__head">Recent hunts</p>
  <p class="dash-trail__empty">No dispatches in the last 7 days. Hounds are holding the line.</p>
</section>`;
      }
      const rows = recentSearches
        .slice(0, 5)
        .map(function (r) {
          const color = typeColorVar(r.instance_type);
          const title = r.item_label || 'Untitled';
          return `
        <div class="dash-trail__row">
          <span class="dash-trail__title">${escHtml(title)}</span>
          <span class="dash-trail__inst" style="color: ${color};">${escHtml(r.instance_name)}</span>
          <span class="dash-trail__when">${escHtml(formatTimeAgo(r.timestamp))}</span>
        </div>`;
        })
        .join('');
      return `
<section class="dash-trail" aria-label="Recent searches">
  <p class="dash-trail__head">Recent hunts</p>
  <div class="dash-trail__list">${rows}
  </div>
</section>`;
    }

    function renderSectionHead() {
      return `
<header class="dash-section-head">
  <h2 class="dash-section-head__title">The hounds on patrol</h2>
  <span class="dash-section-head__rule" aria-hidden="true"></span>
  <a class="dash-section-head__add" href="/settings"
     hx-get="/settings" hx-target="#app-content" hx-swap="innerHTML" hx-push-url="true">+ Add Instance</a>
</header>`;
    }

    function renderTopSection(instances, recentSearches) {
      if (instances.length === 0) {
        return renderSubheader(instances);
      }
      return [
        renderSubheader(instances),
        renderAlert(instances),
        renderLibraryHealth(instances),
        renderRecentHunts(recentSearches),
        renderSectionHead(),
      ].join('');
    }

    function mountTopSection(host, markup) {
      // Parse the rendered markup via a <template> then adopt the
      // resulting nodes.  Avoids Element.innerHTML assignment on the
      // live DOM (all user-controlled values already pass through
      // escHtml in the renderers above).
      const tpl = document.createElement('template');
      // eslint-disable-next-line no-unsanitized/property
      tpl.innerHTML = markup;
      host.replaceChildren(...tpl.content.childNodes);
      // Register any hx-* attributes on the new nodes so HTMX handles
      // clicks on the View-logs link and the + Add Instance link.
      if (window.htmx && typeof window.htmx.process === 'function') {
        window.htmx.process(host);
      }
    }

    document.body.addEventListener(
      'htmx:beforeSwap',
      function (evt) {
        if (evt.detail.target.id !== 'instance-grid') return;

        let payload;
        try { payload = JSON.parse(evt.detail.serverResponse); } catch { return; }
        // Accept both legacy array and v=2 envelope (the dashboard asks
        // for ?v=2 so this is defensive against older servers replying
        // with the array shape).
        const instances = Array.isArray(payload)
          ? payload
          : (payload && Array.isArray(payload.instances) ? payload.instances : []);
        const recentSearches = (payload && Array.isArray(payload.recent_searches))
          ? payload.recent_searches
          : [];

        // Write the top section as a side effect regardless of grid state.
        const topHost = document.getElementById('dash-top');
        if (topHost) mountTopSection(topHost, renderTopSection(instances, recentSearches));

        // ── Empty state ────────────────────────────────────────────────
        if (instances.length === 0) {
          evt.detail.serverResponse = `
<div class="text-center py-20 text-slate-500">
  <svg class="w-14 h-14 mx-auto mb-5 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
  <p class="text-base font-semibold text-slate-400 tracking-tight">No instances configured yet</p>
  <p class="mt-2 text-sm text-slate-500">
    <a href="/settings" hx-get="/settings" hx-target="#app-content" hx-swap="innerHTML"
       hx-push-url="true" class="text-brand-400 hover:text-brand-300 underline underline-offset-2">Add an instance</a>
    in Settings to get started.
  </p>
</div>`;
          return;
        }

        const isInitialHydration = evt.detail.target.dataset.hydrated !== 'true';
        gridInitialHydration = isInitialHydration;

        const data = instances;

        // ── Instance cards ─────────────────────────────────────────────
        const cards = data
          .map((inst, index) => {
            const previous         = previousMetrics.get(inst.id);
            const lastHourChanged  = previous && previous.searches_last_hour !== inst.searches_last_hour;
            const todayChanged     = previous && previous.searches_today     !== inst.searches_today;
            const totalChanged     = previous && previous.items_found_total  !== inst.items_found_total;
            const searched24hChanged = previous && previous.searched_24h !== toNumber(inst.searched_24h);
            const skipped24hChanged  = previous && previous.skipped_24h  !== toNumber(inst.skipped_24h);
            const errors24hChanged   = previous && previous.errors_24h   !== toNumber(inst.errors_24h);

            // Status badge: pulsing dot for active
            const badge = inst.enabled
              ? `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-950/50 text-emerald-300 border border-emerald-800/40">
                   <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block station-pulse-dot"></span> Active
                 </span>`
              : `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-[#151b27] text-slate-500 border border-[#2a3448]">
                   <span class="w-1.5 h-1.5 rounded-full bg-slate-600 inline-block"></span> Disabled
                 </span>`;

            // Type badge
            const typeBadgeMap = {
              sonarr:   `<span class="text-xs font-mono bg-sky-950/60 text-sky-300 px-2 py-0.5 rounded border border-sky-900/50">Sonarr</span>`,
              radarr:   `<span class="text-xs font-mono bg-amber-950/60 text-amber-300 px-2 py-0.5 rounded border border-amber-900/50">Radarr</span>`,
              lidarr:   `<span class="text-xs font-mono bg-emerald-950/60 text-emerald-300 px-2 py-0.5 rounded border border-emerald-900/50">Lidarr</span>`,
              readarr:  `<span class="text-xs font-mono bg-rose-950/60 text-rose-300 px-2 py-0.5 rounded border border-rose-900/50">Readarr</span>`,
              whisparr_v2: `<span class="text-xs font-mono bg-pink-950/60 text-pink-300 px-2 py-0.5 rounded border border-pink-900/50">Whisparr v2</span>`,
              whisparr_v3: `<span class="text-xs font-mono bg-fuchsia-950/60 text-fuchsia-300 px-2 py-0.5 rounded border border-fuchsia-900/50">Whisparr v3</span>`,
            };
            const typeBadge = typeBadgeMap[inst.type] || typeBadgeMap.sonarr;

            // Left border color: signature Station type indicator
            const typeColor = TYPE_COLOR_MAP[inst.type] || TYPE_COLOR_MAP.sonarr;

            const lastSearch   = inst.last_search_at ? formatLocalTimestamp(inst.last_search_at) : 'Never';

            const activityLabelMap = { searched: 'Searched', skipped: 'Skipped', error: 'Error' };
            const lastActivity = inst.last_activity_at
              ? `${activityLabelMap[inst.last_activity_action] || 'Activity'} at ${formatLocalTimestamp(inst.last_activity_at)}`
              : 'No activity in recent history';

            const queueLimit = toNumber(inst.queue_limit);
            const policyChips = [
              `Every ${toNumber(inst.sleep_interval_mins)}m`,
              `Batch ${toNumber(inst.batch_size)}`,
              `Cap/h ${toNumber(inst.hourly_cap)}`,
              `Cooldown ${toNumber(inst.cooldown_days)}d`,
              `Grace ${toNumber(inst.post_release_grace_hrs)}h`,
              queueLimit > 0 ? `Queue ≤${queueLimit}` : null,
              inst.cutoff_enabled ? `Cutoff (${toNumber(inst.cutoff_batch_size)})` : 'No cutoff',
            ].filter(Boolean)
              .map(function (label) {
                return `<span class="rounded border border-[#2a3448] bg-[#151b27] px-2 py-0.5 text-[10px] font-mono text-slate-400">${label}</span>`;
              })
              .join('');

            previousMetrics.set(inst.id, {
              searches_last_hour: inst.searches_last_hour,
              searches_today:     inst.searches_today,
              items_found_total:  inst.items_found_total,
              searched_24h: toNumber(inst.searched_24h),
              skipped_24h:  toNumber(inst.skipped_24h),
              errors_24h:   toNumber(inst.errors_24h),
            });

            return `
<div class="instance-card bg-[#0e1117] border border-[#1e2638] rounded-xl p-5 flex flex-col gap-4"
     style="border-left:3px solid ${typeColor}; box-shadow:var(--shadow-2);">

  <!-- Header: name + type, status badge, run-now -->
  <div class="flex items-start justify-between gap-3">
    <div>
      <div class="flex items-center gap-2 flex-wrap">
        <h2 class="text-base font-semibold text-white tracking-tight">${escHtml(inst.name)}</h2>
        ${typeBadge}
      </div>
      <div class="mt-1.5">${badge}</div>
    </div>
    <button
      hx-post="/api/instances/${inst.id}/run-now"
      hx-swap="none"
      data-run-now-btn="true"
      data-instance-id="${inst.id}"
      title="Trigger search now"
      class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
             bg-brand-600 hover:bg-brand-500 text-white transition-colors disabled:opacity-50">
      <svg data-run-now-icon class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span data-run-now-label>Run now</span>
    </button>
  </div>

  <!-- Search count grid -->
  <dl class="grid grid-cols-3 gap-2 text-center">
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${lastHourChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Last hour</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.searches_last_hour}</dd>
    </div>
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${todayChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Today</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.searches_today}</dd>
    </div>
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${totalChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Total</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.items_found_total}</dd>
    </div>
  </dl>

  <!-- 24h status grid -->
  <dl class="grid grid-cols-3 gap-2 text-center">
    <div class="bg-emerald-950/30 rounded-lg px-3 py-2 border border-emerald-900/35 ${searched24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-emerald-400/75 uppercase tracking-widest font-sans">24h searched</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-emerald-200 mt-1">${toNumber(inst.searched_24h)}</dd>
    </div>
    <div class="bg-amber-950/25 rounded-lg px-3 py-2 border border-amber-900/35 ${skipped24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-amber-400/75 uppercase tracking-widest font-sans">24h skipped</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-amber-200 mt-1">${toNumber(inst.skipped_24h)}</dd>
    </div>
    <div class="bg-rose-950/25 rounded-lg px-3 py-2 border border-rose-900/35 ${errors24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-rose-400/75 uppercase tracking-widest font-sans">24h errors</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-rose-200 mt-1">${toNumber(inst.errors_24h)}</dd>
    </div>
  </dl>

  <!-- Activity timestamps -->
  <div class="space-y-1 text-xs text-slate-500">
    <p class="font-sans">Last activity: <span class="text-slate-300 font-mono">${lastActivity}</span></p>
    <p class="font-sans">Last searched: <span class="text-slate-300 font-mono">${lastSearch}</span></p>
  </div>

  <!-- Policy chips -->
  <div class="flex flex-wrap gap-1.5">
    ${policyChips}
  </div>
</div>`;
          })
          .join('');

        evt.detail.serverResponse = `<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">${cards}</div>`;
        evt.detail.target.dataset.hydrated = 'true';
      },
      { signal },
    );

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const formatLocalTimestamp =
      window.houndarrClientHelpers?.formatLocalTimestamp ||
      function (isoTimestamp) {
        const parsed = new Date(isoTimestamp);
        if (Number.isNaN(parsed.getTime())) return isoTimestamp;
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false, timeZoneName: 'short',
        }).format(parsed);
      };

    document.body.addEventListener(
      'htmx:afterSwap',
      function (evt) {
        if (evt.detail.target.id !== 'instance-grid') return;
        if (!gridInitialHydration) return;
        gridInitialHydration = false;
        const grid = evt.detail.target;
        grid.classList.add('is-entering');
        window.setTimeout(function () { grid.classList.remove('is-entering'); }, 200);
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:beforeRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) return;
        triggerEl.dataset.runNowStartedAt = String(Date.now());
        setRunNowButtonState(triggerEl, 'running');
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:afterRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) return;
        const statusCode = evt.detail.xhr ? evt.detail.xhr.status : 0;
        completeRunNowRequest(triggerEl, statusCode);
      },
      { signal },
    );
  })();
</script>
