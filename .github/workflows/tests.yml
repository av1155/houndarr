name: Tests

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "website/**"
      - ".claude/**"
      - "scripts/marketing/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      # Run pytest under xdist with worker-per-CPU.  Each test gets its own
      # tmp_data_dir + per-call respx mocks, so worker isolation holds.
      # The browser e2e suite is excluded by `norecursedirs` in pyproject.toml.
      - name: Run tests
        run: uv run pytest -q --tb=short -n auto

      - name: Sanity checks
        run: |
          uv run python -m compileall -q src/
          uv run python -m houndarr --help > /dev/null
